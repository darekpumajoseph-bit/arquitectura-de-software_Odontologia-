<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Tratamiento-Cita</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
            background: #f1f5f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #1e293b; }
        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover { background: #0369a1; }
        .btn-success { background: #22c55e; }
        .btn-success:hover { background: #16a34a; }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 15px;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .exito { color: #22c55e; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .form-group {
            margin: 10px 0;
        }
        input, select {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .tabla {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .tabla th {
            background: #f1f5f9;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        .tabla td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Prueba Tratamiento ↔ Cita</h1>
        <p>Esta página prueba la relación entre tratamientos y citas.</p>

        <hr>

        <h3>📋 Datos Actuales</h3>
        <button onclick="verDatos()">Ver todos los datos</button>
        <div id="resultadoDatos" class="resultado">
            <p style="color:#94a3b8;">Haz clic en el botón para ver los datos</p>
        </div>

        <hr>

        <h3>📝 Crear Cita y Asociar Tratamiento</h3>
        <div class="row-2">
            <div class="form-group">
                <label>ID Paciente:</label>
                <input type="number" id="idPaciente" value="1">
            </div>
            <div class="form-group">
                <label>ID Odontólogo:</label>
                <input type="number" id="idOdontologo" value="1">
            </div>
        </div>
        <div class="row-2">
            <div class="form-group">
                <label>ID Tratamiento:</label>
                <input type="number" id="idTratamiento" value="1">
            </div>
            <div class="form-group">
                <label>ID Consultorio:</label>
                <input type="number" id="idConsultorio" value="1">
            </div>
        </div>
        <div class="row-2">
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="fecha" value="2026-07-10">
            </div>
            <div class="form-group">
                <label>Hora:</label>
                <input type="time" id="hora" value="10:00">
            </div>
        </div>
        <div class="form-group">
            <label>Estado:</label>
            <select id="estado">
                <option value="En Espera">En Espera</option>
                <option value="En Consulta">En Consulta</option>
                <option value="Finalizado">Finalizado</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </div>

        <button class="btn-success" onclick="crearCitaYAsociar()">✅ Crear Cita y Asociar Tratamiento</button>

        <div id="resultadoCrear" class="resultado">
            <p style="color:#94a3b8;">Completa los campos y haz clic en el botón</p>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";

        function mostrarJSON(elementId, data) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        function mostrarResultado(elementId, mensaje, esError = false) {
            const el = document.getElementById(elementId);
            const clase = esError ? 'error' : 'exito';
            el.innerHTML = `<div class="${clase}">${mensaje}</div>`;
        }

        // ── Ver todos los datos ────────────────────────────
        async function verDatos() {
            const el = document.getElementById('resultadoDatos');
            el.innerHTML = '⏳ Cargando...';
            
            try {
                const [citas, tratamientos] = await Promise.all([
                    fetch(`${API}/citas`).then(r => r.json()),
                    fetch(`${API}/tratamientos`).then(r => r.json())
                ]);

                el.innerHTML = `
                    <h4>📋 Citas (${citas.length})</h4>
                    <pre>${JSON.stringify(citas, null, 2)}</pre>
                    <h4>📋 Tratamientos (${tratamientos.length})</h4>
                    <pre>${JSON.stringify(tratamientos, null, 2)}</pre>
                    <p><strong>Relación:</strong> Un tratamiento tiene <code>id_cita</code> que referencia a una cita.</p>
                `;
            } catch (error) {
                el.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // ── Crear cita y asociar tratamiento ──────────────────
        async function crearCitaYAsociar() {
            const resultado = document.getElementById('resultadoCrear');
            resultado.innerHTML = '⏳ Procesando...';

            const idTratamiento = parseInt(document.getElementById('idTratamiento').value);
            
            const dataCita = {
                id_paciente: parseInt(document.getElementById('idPaciente').value),
                id_odontologo: parseInt(document.getElementById('idOdontologo').value),
                id_consultorio: parseInt(document.getElementById('idConsultorio').value),
                fecha: document.getElementById('fecha').value,
                hora: document.getElementById('hora').value + ':00',
                estado: document.getElementById('estado').value,
                motivo_consulta: 'Prueba de asociación',
                observaciones: null
            };

            console.log('📡 Creando cita:', dataCita);

            try {
                // PASO 1: Crear la cita
                const resCita = await fetch(`${API}/citas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataCita)
                });

                if (!resCita.ok) {
                    const error = await resCita.json();
                    throw new Error(error.detail || `Error ${resCita.status}`);
                }

                const citaCreada = await resCita.json();
                console.log('✅ Cita creada:', citaCreada);

                // PASO 2: Asociar el tratamiento a la cita
                if (citaCreada && citaCreada.id_cita) {
                    const dataTratamiento = {
                        id_cita: citaCreada.id_cita
                    };

                    console.log(`📡 Asociando tratamiento ${idTratamiento} → cita ${citaCreada.id_cita}`);
                    
                    const resTratamiento = await fetch(`${API}/tratamientos/${idTratamiento}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dataTratamiento)
                    });

                    if (!resTratamiento.ok) {
                        const error = await resTratamiento.json();
                        throw new Error(`Error al asociar tratamiento: ${error.detail || resTratamiento.status}`);
                    }

                    const tratamientoActualizado = await resTratamiento.json();
                    console.log('✅ Tratamiento actualizado:', tratamientoActualizado);

                    resultado.innerHTML = `
                        <div class="exito">✅ ¡Cita creada y tratamiento asociado exitosamente!</div>
                        <h4>Cita creada:</h4>
                        <pre>${JSON.stringify(citaCreada, null, 2)}</pre>
                        <h4>Tratamiento actualizado:</h4>
                        <pre>${JSON.stringify(tratamientoActualizado, null, 2)}</pre>
                        <p><strong>Verifica:</strong> El tratamiento ahora tiene <code>id_cita = ${citaCreada.id_cita}</code></p>
                    `;
                } else {
                    throw new Error('No se pudo obtener el ID de la cita creada');
                }

            } catch (error) {
                console.error('❌ Error:', error);
                resultado.innerHTML = `
                    <div class="error">❌ Error: ${error.message}</div>
                `;
            }
        }
    </script>
</body>
</html>
