<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdontoSoft - Roles</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="modalRol" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitulo">Nuevo Rol</h3>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Nombre del Rol</label>
      <input type="text" id="inNombre" placeholder="Ej. Odontólogo">
    </div>
    <div class="form-group">
      <label>Descripción Operativa</label>
      <textarea id="inDescripcion" rows="3" placeholder="Descripción del rol..."></textarea>
    </div>
    <div class="form-group">
      <label>Permisos</label>
      <select id="inPermisos">
        <option value="FULL ACCESS">FULL ACCESS</option>
        <option value="READ / UPDATE">READ / UPDATE</option>
        <option value="READ ONLY">READ ONLY</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarRol()">
        <span class="material-symbols-outlined">save</span> Guardar
      </button>
    </div>
  </div>
</div>

<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="material-symbols-outlined">dentistry</span>
      <span>OdontoSoft</span>
    </div>
    <nav class="sidebar-menu">
      <a href="panel.html"><span class="material-symbols-outlined">group</span> Usuarios</a>
      <a href="roles.html" class="active"><span class="material-symbols-outlined">manage_accounts</span> Roles</a>
      <a href="tratamientos.html"><span class="material-symbols-outlined">medical_services</span> Tratamientos</a>
      <a href="citas.html"><span class="material-symbols-outlined">calendar_month</span> Citas</a>
      <a href="proveedores.html"><span class="material-symbols-outlined">local_shipping</span> Proveedores</a>
      <a href="panel_cliente.html"><span class="material-symbols-outlined">account_circle</span>Paciente</a>
      <a href="login.html"><span class="material-symbols-outlined">logout</span> Salir</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="content-header">
      <h2>Roles y Permisos del Sistema</h2>
      <button class="btn-primary" onclick="abrirModal()">
        <span class="material-symbols-outlined">add_moderator</span> Nuevo Rol
      </button>
    </header>

    <section class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre del Rol</th>
            <th>Descripción Operativa</th>
            <th>Permisos CRUD</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaRoles">
          <tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Cargando...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  const coloresPermisos = { "FULL ACCESS": "red", "READ / UPDATE": "blue", "READ ONLY": "green" };

  function toast(msg, tipo = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  async function api(method, path, body = null) {
    const res = await fetch(`${API}${path}`, {
      method, headers: { "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : null
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Error"); }
    return res.json();
  }

  async function cargarRoles() {
    try {
      const roles = await api("GET", "/roles");
      const tbody = document.getElementById("tablaRoles");
      if (!roles.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Sin roles. Crea el primero.</td></tr>`;
        return;
      }
      tbody.innerHTML = roles.map(r => `
        <tr>
          <td>${r.id}</td>
          <td><strong>${r.nombre}</strong></td>
          <td>${r.descripcion || '—'}</td>
          <td><span class="badge ${coloresPermisos[r.permisos] || 'blue'}">${r.permisos || '—'}</span></td>
          <td>
            <button class="btn-icon" onclick="editarRol(${r.id})"><span class="material-symbols-outlined">edit</span></button>
            <button class="btn-danger" onclick="eliminarRol(${r.id})"><span class="material-symbols-outlined">delete</span></button>
          </td>
        </tr>
      `).join("");
    } catch { toast("No se pudo conectar con la API", "error"); }
  }

  function abrirModal() {
    document.getElementById("editId").value = "";
    document.getElementById("modalTitulo").textContent = "Nuevo Rol";
    document.getElementById("inNombre").value = "";
    document.getElementById("inDescripcion").value = "";
    document.getElementById("inPermisos").value = "READ ONLY";
    document.getElementById("modalRol").classList.add("open");
  }

  function cerrarModal() { document.getElementById("modalRol").classList.remove("open"); }

  async function editarRol(id) {
    const r = await api("GET", `/roles/${id}`);
    document.getElementById("editId").value = r.id;
    document.getElementById("modalTitulo").textContent = "Editar Rol";
    document.getElementById("inNombre").value = r.nombre;
    document.getElementById("inDescripcion").value = r.descripcion || "";
    document.getElementById("inPermisos").value = r.permisos || "READ ONLY";
    document.getElementById("modalRol").classList.add("open");
  }

  async function guardarRol() {
    const id = document.getElementById("editId").value;
    const data = {
      nombre: document.getElementById("inNombre").value,
      descripcion: document.getElementById("inDescripcion").value,
      permisos: document.getElementById("inPermisos").value
    };
    try {
      if (id) { await api("PUT", `/roles/${id}`, data); toast("Rol actualizado"); }
      else    { await api("POST", "/roles", data);     toast("Rol creado"); }
      cerrarModal(); cargarRoles();
    } catch(e) { toast(e.message, "error"); }
  }

  async function eliminarRol(id) {
    if (!confirm("¿Eliminar este rol?")) return;
    try { await api("DELETE", `/roles/${id}`); toast("Rol eliminado"); cargarRoles(); }
    catch(e) { toast(e.message, "error"); }
  }

  cargarRoles();
</script>
</body>
</html>
