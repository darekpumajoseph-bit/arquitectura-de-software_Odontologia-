<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoSoft - Roles</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/roles.css">
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- Modal -->
    <div id="modalRol" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitulo">Nuevo Rol</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Nombre del Rol</label>
                <input type="text" id="inNombre" placeholder="Ej. Odontólogo">
            </div>
            <div class="form-group">
                <label>Descripción Operativa</label>
                <textarea id="inDescripcion" rows="3" placeholder="Descripción del rol..."></textarea>
            </div>
            <div class="form-group">
                <label>Permisos</label>
                <select id="inPermisos">
                    <option value="FULL ACCESS">FULL ACCESS</option>
                    <option value="READ / UPDATE">READ / UPDATE</option>
                    <option value="READ ONLY">READ ONLY</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-guardar" onclick="guardarRol()">
                    <span class="material-symbols-outlined">save</span> Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="material-symbols-outlined">dentistry</span>
                <span>OdontoSoft</span>
            </div>
            <nav class="sidebar-menu">
                <a href="panel.html"><span class="material-symbols-outlined">group</span> Usuarios</a>
                <a href="roles.html" class="active"><span class="material-symbols-outlined">manage_accounts</span> Roles</a>
                <a href="tratamientos.html"><span class="material-symbols-outlined">medical_services</span> Tratamientos</a>
                <a href="citas.html"><span class="material-symbols-outlined">calendar_month</span> Citas</a>
                <a href="proveedores.html"><span class="material-symbols-outlined">local_shipping</span> Proveedores</a>
                <a href="login.html" onclick="localStorage.removeItem('usuario_actual')"><span class="material-symbols-outlined">logout</span> Salir</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2>Roles y Permisos del Sistema</h2>
                <button class="btn-primary" onclick="abrirModal()">
                    <span class="material-symbols-outlined">add_moderator</span> Nuevo Rol
                </button>
            </header>

            <section class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre del Rol</th>
                            <th>Descripción</th>
                            <th>Permisos</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaRoles">
                        <tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Cargando...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script type="module" src="js/roles.js"></script>
</body>
</html>
