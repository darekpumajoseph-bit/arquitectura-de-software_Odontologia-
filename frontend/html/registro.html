<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoSoft - Registro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
    <style>
        .registro-card { max-width:500px; }
        .error-message { color:#ef4444; font-size:0.85rem; margin-top:4px; display:none; }
        .error-message.show { display:block; }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none !important; }
        .btn-primary .spinner { animation:spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .password-strength { font-size:0.8rem; margin-top:4px; }
        .password-strength.weak { color:#ef4444; }
        .password-strength.medium { color:#eab308; }
        .password-strength.strong { color:#22c55e; }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="registro-card">
    <div class="registro-brand">
        <span class="material-symbols-outlined">dentistry</span>
        <h1>Odonto<span>Soft</span></h1>
    </div>
    <p class="registro-subtitle">Registro de Usuario - Sistema de Gestión Odontológica</p>

    <form id="registroForm" novalidate>
        <div class="form-group">
            <label>Nombre <span style="color:#ef4444;">*</span></label>
            <input type="text" id="inNombre" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
            <label>Apellido <span style="color:#ef4444;">*</span></label>
            <input type="text" id="inApellido" placeholder="Tu apellido" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico <span style="color:#ef4444;">*</span></label>
            <input type="email" id="inCorreo" placeholder="usuario@dental.com" required>
            <small id="correoError" class="error-message">Ingresa un correo electrónico válido</small>
        </div>
        <div class="form-group">
            <label>Teléfono <span style="color:#ef4444;">*</span></label>
            <input type="tel" id="inTelefono" placeholder="3001234567" required>
        </div>

        <div class="form-group password-group">
            <label>Contraseña <span style="color:#ef4444;">*</span></label>
            <div class="input-wrapper">
                <input type="password" id="inPassword" placeholder="••••••••" required minlength="6">
                <span class="material-symbols-outlined toggle-password" onclick="togglePassword('inPassword')">visibility_off</span>
            </div>
            <small id="passwordError" class="error-message">La contraseña debe tener al menos 6 caracteres</small>
            <div id="passwordStrength" class="password-strength"></div>
        </div>

        <div class="form-group password-group">
            <label>Confirmar Contraseña <span style="color:#ef4444;">*</span></label>
            <div class="input-wrapper">
                <input type="password" id="inConfirmPassword" placeholder="••••••••" required>
                <span class="material-symbols-outlined toggle-password" onclick="togglePassword('inConfirmPassword')">visibility_off</span>
            </div>
            <small id="confirmError" class="error-message">Las contraseñas no coinciden</small>
        </div>

        <button type="submit" class="btn-primary" id="btnRegistrar">
            <span class="material-symbols-outlined">how_to_reg</span> Registrarse
        </button>
    </form>

    <p class="link-login">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
</div>

<script src="../js/auth.js"></script>
<script>
    document.getElementById('inCorreo').addEventListener('input', function() {
        const error = document.getElementById('correoError');
        if (this.value.length > 0 && !validarCorreo(this.value)) error.classList.add('show');
        else error.classList.remove('show');
    });

    document.getElementById('inPassword').addEventListener('input', function() {
        const pwd = this.value;
        const error = document.getElementById('passwordError');
        if (pwd.length > 0 && pwd.length < 6) error.classList.add('show');
        else error.classList.remove('show');
        mostrarFortaleza(pwd);
        verificarCoincidencia();
    });

    document.getElementById('inConfirmPassword').addEventListener('input', function() {
        verificarCoincidencia();
    });

    function verificarCoincidencia() {
        const pwd = document.getElementById('inPassword').value;
        const confirm = document.getElementById('inConfirmPassword').value;
        const error = document.getElementById('confirmError');
        if (confirm.length > 0 && pwd !== confirm) error.classList.add('show');
        else error.classList.remove('show');
    }

    document.getElementById('registroForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const nombre = document.getElementById('inNombre').value.trim();
        const apellido = document.getElementById('inApellido').value.trim();
        const correo = document.getElementById('inCorreo').value.trim();
        const telefono = document.getElementById('inTelefono').value.trim();
        const password = document.getElementById('inPassword').value;
        const confirmPassword = document.getElementById('inConfirmPassword').value;

        if (!nombre || !apellido || !correo || !telefono || !password || !confirmPassword) {
            toast('Todos los campos son obligatorios', 'error'); return;
        }
        if (!validarCorreo(correo)) { toast('Ingresa un correo válido', 'error'); return; }
        if (password.length < 6) { toast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
        if (password !== confirmPassword) { toast('Las contraseñas no coinciden', 'error'); return; }

        const btn = document.getElementById('btnRegistrar');
        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined spinner">progress_activity</span> Registrando...`;

        try {
            const response = await fetch('http://127.0.0.1:8000/usuarios/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, contrasena: password, nombre, apellido, telefono })
            });

            const responseText = await response.text();
            let data;
            try { data = JSON.parse(responseText); }
            catch { throw new Error(`Error: ${responseText.substring(0, 100)}`); }

            if (!response.ok) throw new Error(data.detail || `Error ${response.status}`);

            toast(`✅ ¡Registro exitoso! Bienvenido ${nombre} ${apellido}`);
            document.getElementById('registroForm').reset();
            document.getElementById('passwordStrength').textContent = '';
            document.getElementById('passwordStrength').className = 'password-strength';

            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } catch (error) {
            toast(`❌ ${error.message}`, 'error');
            btn.disabled = false;
            btn.innerHTML = `<span class="material-symbols-outlined">how_to_reg</span> Registrarse`;
        }
    });
</script>
</body>
</html>
