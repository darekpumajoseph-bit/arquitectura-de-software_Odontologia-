<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdontoSoft - Registro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
</head>
<body>
<div class="registro-card">
  <div class="registro-brand">
    <span class="material-symbols-outlined">dentistry</span>
    <h1>Odonto<span>Soft</span></h1>
  </div>
  <p class="registro-subtitle">
    Registro de Usuario - Sistema de Gestión Odontológica
  </p>

  <form onsubmit="return validarRegistro()">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" placeholder="Nombre" required>
    </div>
    <div class="form-group">
      <label>Apellido</label>
      <input type="text" placeholder="Apellido" required>
    </div>
    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" placeholder="usuario@dental.com" required>
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="tel" placeholder="3001234567" required>
    </div>

    <!-- Contraseña -->
    <div class="form-group password-group">
      <label>Contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="••••••••" required>
        <span class="material-symbols-outlined toggle-password" onclick="togglePassword('password')">
          visibility_off
        </span>
      </div>
    </div>

    <!-- Confirmar contraseña -->
    <div class="form-group password-group">
      <label>Confirmar Contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
        <span class="material-symbols-outlined toggle-password" onclick="togglePassword('confirmPassword')">
          visibility_off
        </span>
      </div>
      <!-- Mensaje de error debajo -->
      <small id="errorMsg" class="error-message"></small>
    </div>

    <button type="submit" class="btn-primary">
      <span class="material-symbols-outlined">how_to_reg</span> Registrarse
    </button>
  </form>

  <p class="link-login">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
  </p>
</div>

<!-- Importar el JS externo -->
<script src="../js/auth.js"></script>
</body>
</html>
