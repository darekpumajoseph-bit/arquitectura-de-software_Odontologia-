<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoSoft - Tratamientos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="modalTrat" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitulo">Nuevo Tratamiento</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>Nombre del Tratamiento</label>
            <input type="text" id="inNombre" placeholder="Ej. Limpieza Dental">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="inDescripcion" rows="3" placeholder="Descripción del procedimiento..."></textarea>
        </div>
        <div class="form-group">
            <label>Precio Base (COP $)</label>
            <input type="number" id="inPrecio" placeholder="150000" min="0">
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primary" onclick="guardarTratamiento()">
                <span class="material-symbols-outlined">save</span> Guardar
            </button>
        </div>
    </div>
</div>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="material-symbols-outlined">dentistry</span>
            <span>OdontoSoft</span>
        </div>
        <nav class="sidebar-menu">
            <a href="panel.html"><span class="material-symbols-outlined">group</span> Usuarios</a>
            <a href="roles.html"><span class="material-symbols-outlined">manage_accounts</span> Roles</a>
            <a href="tratamientos.html" class="active"><span class="material-symbols-outlined">medical_services</span> Tratamientos</a>
            <a href="citas.html"><span class="material-symbols-outlined">calendar_month</span> Citas</a>
            <a href="proveedores.html"><span class="material-symbols-outlined">local_shipping</span> Proveedores</a>
            <a href="panel_cliente.html"><span class="material-symbols-outlined">account_circle</span> Paciente</a>
            <a href="login.html" onclick="localStorage.removeItem('usuario_actual')"><span class="material-symbols-outlined">logout</span> Salir</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <h2>Catálogo de Tratamientos</h2>
            <button class="btn-primary" onclick="abrirModal()">
                <span class="material-symbols-outlined">add</span> Nuevo Tratamiento
            </button>
        </header>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio Base</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaTratamientos">
                    <tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Cargando...</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>

<script>
    const API = "http://127.0.0.1:8000";

    function toast(msg, tipo = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg; t.className = `toast show ${tipo}`;
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    async function api(method, path, body = null) {
        const res = await fetch(`${API}${path}`, {
            method, headers: { "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : null
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Error"); }
        return res.json();
    }

    async function cargarTratamientos() {
        try {
            const lista = await api("GET", "/tratamientos");
            const tbody = document.getElementById("tablaTratamientos");
            if (!lista.length) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Sin tratamientos registrados</td></tr>`;
                return;
            }
            tbody.innerHTML = lista.map(t => `
                <tr>
                    <td>${t.id_tratamiento}</td>
                    <td><strong>${t.nombre}</strong></td>
                    <td>${t.descripcion || '—'}</td>
                    <td>$${(t.costo || 0).toLocaleString('es-CO')}</td>
                    <td>
                        <button class="btn-icon" onclick="editarTratamiento(${t.id_tratamiento})"><span class="material-symbols-outlined">edit</span></button>
                        <button class="btn-danger" onclick="eliminarTratamiento(${t.id_tratamiento})"><span class="material-symbols-outlined">delete</span></button>
                    </td>
                </tr>
            `).join("");
        } catch { toast("No se pudo conectar con la API", "error"); }
    }

    function abrirModal() {
        document.getElementById("editId").value = "";
        document.getElementById("modalTitulo").textContent = "Nuevo Tratamiento";
        document.getElementById("inNombre").value = "";
        document.getElementById("inDescripcion").value = "";
        document.getElementById("inPrecio").value = "";
        document.getElementById("modalTrat").classList.add("open");
    }

    function cerrarModal() { document.getElementById("modalTrat").classList.remove("open"); }

    async function editarTratamiento(id) {
        const t = await api("GET", `/tratamientos/${id}`);
        document.getElementById("editId").value = t.id_tratamiento;
        document.getElementById("modalTitulo").textContent = "Editar Tratamiento";
        document.getElementById("inNombre").value = t.nombre;
        document.getElementById("inDescripcion").value = t.descripcion || "";
        document.getElementById("inPrecio").value = t.costo || 0;
        document.getElementById("modalTrat").classList.add("open");
    }

    async function guardarTratamiento() {
        const id = document.getElementById("editId").value;
        const data = {
            nombre: document.getElementById("inNombre").value,
            descripcion: document.getElementById("inDescripcion").value,
            costo: parseFloat(document.getElementById("inPrecio").value) || 0,
            id_cita: 1 // Temporal - debería seleccionarse una cita
        };
        try {
            if (id) { await api("PUT", `/tratamientos/${id}`, data); toast("Tratamiento actualizado"); }
            else { await api("POST", "/tratamientos", data); toast("Tratamiento creado"); }
            cerrarModal(); cargarTratamientos();
        } catch(e) { toast(e.message, "error"); }
    }

    async function eliminarTratamiento(id) {
        if (!confirm("¿Eliminar este tratamiento?")) return;
        try { await api("DELETE", `/tratamientos/${id}`); toast("Tratamiento eliminado"); cargarTratamientos(); }
        catch(e) { toast(e.message, "error"); }
    }

    const usuarioActual = JSON.parse(localStorage.getItem('usuario_actual') || 'null');
    if (!usuarioActual) { window.location.href = "login.html"; }

    cargarTratamientos();
</script>
</body>
</html>
